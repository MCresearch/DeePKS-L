# Test configuration for SCF workflow with ABACUS backend
type: scf
scf_soft: abacus

# Systems to calculate
systems:
  - tests/data/systems/H2O

# Output configuration
dump_dir: test_scf_output
dump_fields:
  - e_tot
  - e_base
  - dm_eig
  - conv

# ABACUS-specific configuration
scf_abacus:
  ntype: 2
  ecutwfc: 100
  scf_thr: 1e-7
  scf_nmax: 100
  dft_functional: "pbe"
  gamma_only: 1
  lattice_constant: 1.8897261255
  lattice_vector:
    - [10.0, 0.0, 0.0]
    - [0.0, 10.0, 0.0]
    - [0.0, 0.0, 10.0]
  coord_type: "Cartesian"
  run_cmd: "mpirun"
  abacus_path: "abacus"
  cal_force: 0
  cal_stress: 0
  deepks_scf: 0
  deepks_out_labels: 1

  # File paths (will be set to absolute paths)
  orb_files: []
  pp_files: []
  proj_file: []

# Machine configuration
scf_machine:
  group_size: 1
  resources:
    task_per_node: 1
  dispatcher:
    batch: shell
    context: local

# General settings
verbose: 1
